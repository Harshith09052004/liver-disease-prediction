{% extends 'htmls/RUser/design.html' %}

{% block userblock %}

<h2 align="center">Predict Liver Disease</h2>

<form method="POST">
{% csrf_token %}

<table align="center">

<tr>
<td>Age</td>
<td><input type="text" name="Age"></td>
</tr>

<tr>
<td>Total Bilirubin</td>
<td><input type="text" name="Total_Bilirubin"></td>
</tr>

<tr>
<td>Direct Bilirubin</td>
<td><input type="text" name="Direct_Bilirubin"></td>
</tr>

<tr>
<td>Alkaline Phosphotase</td>
<td><input type="text" name="Alkaline_Phosphotase"></td>
</tr>

<tr>
<td>Alanine Aminotransferase</td>
<td><input type="text" name="Alamine_Aminotransferase"></td>
</tr>

<tr>
<td>Aspartate Aminotransferase</td>
<td><input type="text" name="Aspartate_Aminotransferase"></td>
</tr>

<tr>
<td>Total Proteins</td>
<td><input type="text" name="Total_Protiens"></td>
</tr>

<tr>
<td>Albumin</td>
<td><input type="text" name="Albumin"></td>
</tr>

<tr>
<td>Albumin Globulin Ratio</td>
<td><input type="text" name="Albumin_and_Globulin_Ratio"></td>
</tr>

<tr>
<td></td>
<td><input type="submit" value="Predict"></td>
</tr>

</table>

</form>

<h3 align="center">{{objs}}</h3>

{% endblock %}
