<!DOCTYPE html>
<html>
<head>
    <title>Predict</title>

    <link href="https://fonts.googleapis.com/css?family=Righteous" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Fredoka+One" rel="stylesheet">

    <style>
        body {
            background: url("/static/bg.jpg");
            background-size: cover;
            margin: 0;
        }

        #title {
            font-family: 'Fredoka One', cursive;
            text-align: center;
            color: red;
            margin-top: 20px;
        }

        .menu {
            background: #a80000;
            padding: 15px;
            text-align: center;
        }

        .menu a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Righteous', cursive;
        }

        /* MAIN CARD */
        .form-box {
            width: 500px;
            margin: 60px auto;
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .form-title {
    text-align: center;
    color: #b71c1c;
    margin-bottom: 20px;
    font-family: 'Righteous', cursive;   /* 🔥 ADD THIS */
    font-weight: bold;
}

        .form-row {
            display: flex;
            margin-bottom: 10px;
        }

        .form-row label {
            width: 55%;
            background: #d32f2f;
            color: white;
            padding: 8px;
            font-weight: bold;
        }

        .form-row input {
            width: 45%;
            padding: 8px;
            border: 1px solid #ccc;
        }

        .predict-btn {
            width: 100%;
            background: #1976d2;
            color: white;
            padding: 10px;
            border: none;
            margin-top: 15px;
            cursor: pointer;
            font-size: 16px;
        }

        .predict-btn:hover {
            background: #0d47a1;
        }

        .result-box {
            margin-top: 20px;
            background: #d32f2f;
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1 id="title">
Comparative Analysis of Liver diseases by using Machine Learning Techniques
</h1>

<div class="menu">
    <a href="/Predict_Liver_Disease_Status/">PREDICT LIVER DISEASE</a>
    <a href="/ViewYourProfile/">VIEW YOUR PROFILE</a>
    <a href="/logout/">LOGOUT</a>
</div>

<!-- SINGLE CLEAN BOX -->
<div class="form-box">

    <h2 class="form-title">Liver Disease Prediction</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-row">
            <label>Enter Age</label>
            <input type="number" name="age" required>
        </div>

        <div class="form-row">
            <label>Enter Gender</label>
            <input type="text" name="gender" required>
        </div>

        <div class="form-row">
            <label>Total Bilirubin</label>
            <input type="number" step="any" name="total_bilirubin" required>
        </div>

        <div class="form-row">
            <label>Direct Bilirubin</label>
            <input type="number" step="any" name="direct_bilirubin" required>
        </div>

        <div class="form-row">
            <label>Alkaline Phosphatase</label>
            <input type="number" step="any" name="alkaline_phosphotase" required>
        </div>

        <div class="form-row">
            <label>Alamine Aminotransferase</label>
            <input type="number" step="any" name="alamine_aminotransferase" required>
        </div>

        <div class="form-row">
            <label>Aspartate Aminotransferase</label>
            <input type="number" step="any" name="aspartate_aminotransferase" required>
        </div>

        <div class="form-row">
            <label>Total Proteins</label>
            <input type="number" step="any" name="total_proteins" required>
        </div>

        <div class="form-row">
            <label>Albumin</label>
            <input type="number" step="any" name="albumin" required>
        </div>

        <div class="form-row">
            <label>Albumin/Globulin Ratio</label>
            <input type="number" step="any" name="albumin_globulin_ratio" required>
        </div>

        <button class="predict-btn">Predict</button>
    </form>

    {% if result %}
    <div class="result-box">
        Liver Disease Status: {{ result }}
    </div>
    {% endif %}

</div>

</body>
</html>
