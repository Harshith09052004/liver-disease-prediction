{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

```
<!-- Bootstrap -->
<link href="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css?family=Lobster" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Righteous" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Fredoka+One" rel="stylesheet">

<style>
    body {
        background: url("{% static 'bg.jpg' %}");
        background-size: cover;
    }

    .container-fluid {
        padding: 50px;
    }

    .container-box {
        background-color: white;
        padding: 40px;
        border-radius: 10px;
    }

    #title {
        font-family: 'Fredoka One', cursive;
    }

    .text-uppercase {
        font-family: 'Righteous', cursive;
    }

    .style1 {
        color: #FF0000;
        font-weight: bold;
    }

    .style5 {
        font-family: 'Righteous', cursive;
        color: #FF0000;
        font-weight: bold;
    }
</style>
```

</head>

<body>
    <div class="container-fluid">
        <h2 class="text-center style1" id="title">
            Comparative Analysis of Liver diseases by using Machine Learning Techniques
        </h2>

```
    <p class="text-center">
        <small class="text-muted style1">
            Liver Diseases, Machine Learning algorithms, Physicians, Patients.
        </small>
    </p>

    <hr>

    <div class="row justify-content-center">
        <div class="col-md-5 container-box">

            <div class="text-center mb-4">
                <h4 class="style5">Welcome Back</h4>
            </div>

            <form method="POST">
                {% csrf_token %}

                <p class="style5 text-center">Login Using Your Account</p>

                <div class="form-group">
                    <input type="text" name="username" class="form-control" placeholder="User Name" required>
                </div>

                <div class="form-group">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>

                <div class="text-center">
                    <input type="submit" name="submit1" class="btn btn-primary" value="Sign In">
                </div>

                <br>

                <p class="style5 text-center">Other Options</p>

                <div class="text-center">
                    <a href="{% url 'serviceproviderlogin' %}" class="btn btn-success">SERVICE PROVIDER</a>
                    <a href="{% url 'Register1' %}" class="btn btn-info">REGISTER</a>
                </div>

            </form>
        </div>
    </div>
</div>
```

</body>

</html>
