{% extends 'htmls/RUser/design.html' %}

{% block userblock %}

<h2 align="center">Your Profile</h2>

<table align="center" border="1">

<tr>
<th>Username</th>
<th>Email</th>
<th>Phone</th>
<th>Country</th>
<th>State</th>
<th>City</th>
</tr>

<tr>
<td>{{object.username}}</td>
<td>{{object.email}}</td>
<td>{{object.phoneno}}</td>
<td>{{object.country}}</td>
<td>{{object.state}}</td>
<td>{{object.city}}</td>
</tr>

</table>

{% endblock %}
