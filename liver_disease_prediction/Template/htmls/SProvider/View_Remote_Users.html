{% extends 'htmls/SProvider/design1.html' %}

{% block researchblock %}

<h2 align="center">Registered Users</h2>

<table border="1" align="center">

<tr>
<th>Username</th>
<th>Email</th>
<th>Phone</th>
<th>Country</th>
<th>State</th>
<th>City</th>
</tr>

{% for user in objects %}

<tr>

<td>{{user.username}}</td>
<td>{{user.email}}</td>
<td>{{user.phoneno}}</td>
<td>{{user.country}}</td>
<td>{{user.state}}</td>
<td>{{user.city}}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
