{% extends 'SProvider/design1.html' %}
{% block researchblock %}

<style>
    body{
        background-color: #FFFFFF;
    }

    .menu table{
        width:100%;
        text-align:center;
    }

    .menu table td:hover{
        background: rgb(0,0,0);
        color: white;
    }

    .menu table td{
        background: #584b4f;
        color: white;
    }

    .menu table,
    .menu table th,
    .menu table td {
        border: 1px solid black;
        border-collapse: collapse;
    }

    .menu table th,
    .menu table td {
        padding: 15px;
    }

    .topic h1{
        color:white;
        padding:10px;
        text-align:center;
        height:100px;
    }

    #chartContainer{
        width: 75%;
        margin: auto;
        margin-top: 40px;
    }

    .sidemenu{
        margin-top: 40px;
        margin-left: 60px;
    }
</style>

<script>
window.onload = function () {

    var chart = new CanvasJS.Chart("chartContainer", {
        animationEnabled: true,
        title: {
            text: ""
        },
        data: [{
            {% if chart_type == "line" %}
                type: "line",
            {% elif chart_type == "pie" %}
                type: "pie",
            {% elif chart_type == "spline" %}
                type: "spline",
            {% endif %}
            startAngle: 240,
            yValueFormatString: "##0.00\"%\"",
            indexLabel: "{label} {y}",
            dataPoints: [
                {% for o in form %}
                    { y: {{ o.dcount }}, label: "{{ o.names }}" },
                {% endfor %}
            ]
        }]
    });

    chart.render();
}
</script>

<div class="topic">

    <div class="sidemenu">
        <h3 style="color:black;">
            <a href="{% url 'charts' 'pie' %}">PIE CHART</a><br><br>
            <a href="{% url 'charts' 'line' %}">LINE CHART</a><br><br>
            <a href="{% url 'charts' 'spline' %}">SPLINE CHART</a>
        </h3>
    </div>

    <div id="chartContainer"></div>

</div>

<script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>

{% endblock %}
